<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUAN Persona Vault</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 800px;
    width: 100%;
  }
  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.8rem;
    color: #c0c0ff;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }
  .meta-info {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #999;
  }
  .meta-info span { white-space: nowrap; }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .input-group input {
    flex: 1;
    padding: 0.7rem 1rem;
    border: 1px solid #333;
    border-radius: 6px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
  }
  .input-group input:focus { border-color: #5555aa; }
  button {
    padding: 0.7rem 1.5rem;
    border: none;
    border-radius: 6px;
    background: #3a3a7e;
    color: #e0e0e0;
    font-size: 1rem;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #4a4a9e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #ff6b6b;
    text-align: center;
    margin: 1rem 0;
    display: none;
  }
  .loading {
    text-align: center;
    margin: 2rem 0;
    display: none;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid #333;
    border-top-color: #7777cc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .actions {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    display: none;
  }
  .content-area {
    background: #16213e;
    border: 1px solid #2a2a5e;
    border-radius: 8px;
    padding: 1.5rem;
    max-height: 70vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.85rem;
    line-height: 1.7;
    display: none;
  }
  .content-area h2 {
    color: #9999dd;
    font-size: 1rem;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid #2a2a5e;
    padding-bottom: 0.3rem;
  }
  .content-area h2:first-child { margin-top: 0; }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: #3a3a7e;
    color: #fff;
    padding: 0.7rem 1.5rem;
    border-radius: 6px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>GUAN Persona Vault</h1>
  <p class="subtitle">Encrypted Persona Archive</p>

  <div class="meta-info" id="metaInfo" style="display:none;">
    <span id="metaVersion"></span>
    <span id="metaFiles"></span>
    <span id="metaSize"></span>
  </div>

  <div class="input-group">
    <input type="password" id="keyInput" placeholder="输入密钥..." autocomplete="off" />
    <button id="decryptBtn" onclick="startDecrypt()">解密</button>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loading"><span class="spinner"></span>正在解密，请稍候...</div>

  <div class="actions" id="actions">
    <button onclick="copyWithPrompt()">复制（含提示词）</button>
    <button onclick="copyRaw()">复制原文</button>
  </div>

  <div class="content-area" id="contentArea"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
<script>
let decryptedFiles = null;
let manifest = null;
let bundleData = null;

async function init() {
  try {
    const [manifestRes, bundleRes] = await Promise.all([
      fetch('manifest.json'),
      fetch('bundle.enc')
    ]);
    if (!manifestRes.ok || !bundleRes.ok) {
      showError('无法加载数据文件，请确认 bundle.enc 和 manifest.json 存在。');
      return;
    }
    manifest = await manifestRes.json();
    bundleData = new Uint8Array(await bundleRes.arrayBuffer());

    document.getElementById('metaInfo').style.display = 'flex';
    document.getElementById('metaVersion').textContent = '版本: ' + manifest.version;
    document.getElementById('metaFiles').textContent = '文件数: ' + manifest.file_count;
    document.getElementById('metaSize').textContent = '大小: ' + formatBytes(manifest.bundle_size);
  } catch (e) {
    showError('加载失败: ' + e.message);
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function startDecrypt() {
  const password = document.getElementById('keyInput').value;
  if (!password) { showError('请输入密钥。'); return; }
  if (!bundleData) { showError('数据未加载。'); return; }

  hideError();
  setLoading(true);
  document.getElementById('decryptBtn').disabled = true;

  try {
    // Parse binary format: version(1) + salt(16) + iv(12) + ciphertext(N) + tag(16)
    const version = bundleData[0];
    if (version !== 0x01) throw new Error('不支持的版本: ' + version);

    const salt = bundleData.slice(1, 17);
    const iv = bundleData.slice(17, 29);
    const ciphertextWithTag = bundleData.slice(29); // ciphertext + tag, Web Crypto expects this

    // Derive key with Argon2id
    const argonResult = await argon2.hash({
      pass: password,
      salt: salt,
      time: manifest.encryption.kdf_params.time_cost,
      mem: manifest.encryption.kdf_params.memory_cost,
      parallelism: manifest.encryption.kdf_params.parallelism,
      hashLen: 32,
      type: argon2.ArgonType.Argon2id
    });

    const keyBytes = argonResult.hash;

    // Import key for Web Crypto
    const cryptoKey = await crypto.subtle.importKey(
      'raw', keyBytes, 'AES-GCM', false, ['decrypt']
    );

    // Decrypt — Web Crypto expects ciphertext+tag concatenated
    let decryptedCompressed;
    try {
      decryptedCompressed = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: iv },
        cryptoKey,
        ciphertextWithTag
      );
    } catch (e) {
      showError('密钥错误，请重试');
      return;
    }

    // Decompress gzip
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(decryptedCompressed));
    writer.close();
    const reader = ds.readable.getReader();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const totalLen = chunks.reduce((s, c) => s + c.length, 0);
    const decompressed = new Uint8Array(totalLen);
    let offset = 0;
    for (const chunk of chunks) {
      decompressed.set(chunk, offset);
      offset += chunk.length;
    }

    const jsonStr = new TextDecoder().decode(decompressed);
    const bundle = JSON.parse(jsonStr);
    decryptedFiles = bundle.files;

    // Render content
    renderContent(decryptedFiles);

  } catch (e) {
    if (e.message && e.message.includes('密钥错误')) {
      showError('密钥错误，请重试');
    } else {
      showError('解密失败: ' + e.message);
    }
  } finally {
    setLoading(false);
    document.getElementById('decryptBtn').disabled = false;
  }
}

function renderContent(files) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  area.style.display = 'block';
  document.getElementById('actions').style.display = 'flex';

  for (const file of files) {
    const heading = document.createElement('h2');
    heading.textContent = file.path;
    area.appendChild(heading);

    const content = document.createElement('div');
    content.textContent = file.content;
    area.appendChild(content);
  }
}

function buildPromptText(files) {
  const prefix = '以下是我的个人认知档案（GUAN Persona），请先完整阅读，然后根据档案中的沟通规则和工作方式与我互动：\n\n---\n\n';
  let body = '';
  for (const file of files) {
    body += '## ' + file.path + '\n\n' + file.content + '\n\n---\n\n';
  }
  return prefix + body;
}

function buildRawText(files) {
  let body = '';
  for (const file of files) {
    body += '## ' + file.path + '\n\n' + file.content + '\n\n---\n\n';
  }
  return body;
}

async function copyWithPrompt() {
  if (!decryptedFiles) return;
  const text = buildPromptText(decryptedFiles);
  await navigator.clipboard.writeText(text);
  showToast('已复制（含提示词）');
}

async function copyRaw() {
  if (!decryptedFiles) return;
  const text = buildRawText(decryptedFiles);
  await navigator.clipboard.writeText(text);
  showToast('已复制原文');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Allow Enter key to trigger decrypt
document.getElementById('keyInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startDecrypt();
});

init();
</script>
</body>
</html>
