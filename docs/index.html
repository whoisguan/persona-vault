<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXIA Persona Vault</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 800px;
    width: 100%;
  }
  h1 {
    text-align: center;
    margin-bottom: 0.5rem;
    font-size: 1.8rem;
    color: #c0c0ff;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }
  .meta-info {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: #999;
  }
  .meta-info span { white-space: nowrap; }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .input-group input {
    flex: 1;
    padding: 0.7rem 1rem;
    border: 1px solid #333;
    border-radius: 6px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
  }
  .input-group input:focus { border-color: #5555aa; }
  button {
    padding: 0.7rem 1.5rem;
    border: none;
    border-radius: 6px;
    background: #3a3a7e;
    color: #e0e0e0;
    font-size: 1rem;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #4a4a9e; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #ff6b6b;
    text-align: center;
    margin: 1rem 0;
    display: none;
  }
  .loading {
    text-align: center;
    margin: 2rem 0;
    display: none;
  }
  .loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid #333;
    border-top-color: #7777cc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .actions {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    display: none;
  }
  .content-area {
    background: #16213e;
    border: 1px solid #2a2a5e;
    border-radius: 8px;
    padding: 1.5rem;
    max-height: 70vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.85rem;
    line-height: 1.7;
    display: none;
  }
  .content-area h2 {
    color: #9999dd;
    font-size: 1rem;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid #2a2a5e;
    padding-bottom: 0.3rem;
  }
  .content-area h2:first-child { margin-top: 0; }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: #3a3a7e;
    color: #fff;
    padding: 0.7rem 1.5rem;
    border-radius: 6px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>MIXIA Persona Vault</h1>
  <p class="subtitle">Encrypted Persona Archive</p>

  <div class="meta-info" id="metaInfo" style="display:none;">
    <span id="metaVersion"></span>
    <span id="metaFiles"></span>
    <span id="metaSize"></span>
  </div>

  <div class="input-group">
    <input type="password" id="keyInput" placeholder="输入密钥..." autocomplete="off" />
    <button id="decryptBtn" onclick="startDecrypt()">解密</button>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loading"><span class="spinner"></span>正在解密，请稍候...</div>

  <div class="actions" id="actions">
    <button onclick="copyCapsule()" style="background:#2563eb;">复制 Capsule（推荐）</button>
    <button onclick="startPacketImport()">分段导入</button>
    <button onclick="copyWork()">复制全文（工作版）</button>
    <button onclick="lockVault()" style="background:#6b2020;">锁定</button>
  </div>

  <!-- Packet import panel -->
  <div id="packetPanel" style="display:none; margin-bottom:1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
      <span id="packetProgress" style="font-size:0.85rem; color:#888;">Packet 1/1</span>
      <div style="display:flex; gap:0.5rem;">
        <button onclick="prevPacket()" id="btnPrev" disabled style="padding:0.4rem 0.8rem; font-size:0.85rem;">上一段</button>
        <button onclick="nextPacket()" id="btnNext" style="padding:0.4rem 0.8rem; font-size:0.85rem;">下一段</button>
      </div>
    </div>
    <div style="background:#16213e; border:1px solid #2a2a5e; border-radius:8px; padding:1rem; max-height:200px; overflow-y:auto; font-family:monospace; font-size:0.8rem; white-space:pre-wrap; word-wrap:break-word;" id="packetContent"></div>
    <button onclick="copyPacket()" style="width:100%; margin-top:0.5rem; background:#2563eb;" id="copyPacketBtn">复制当前段</button>
  </div>

  <div class="content-area" id="contentArea"></div>
</div>

<div class="toast" id="toast"></div>

<script src="argon2-bundled.min.js"></script>
<script>
let decryptedFiles = null;
let manifest = null;
let bundleData = null;
let packets = [];
let currentPacket = 0;
const PACKET_MAX = 2048; // bytes per packet, conservative for mobile

async function init() {
  try {
    const [manifestRes, bundleRes] = await Promise.all([
      fetch('manifest.json'),
      fetch('bundle.enc')
    ]);
    if (!manifestRes.ok || !bundleRes.ok) {
      showError('无法加载数据文件，请确认 bundle.enc 和 manifest.json 存在。');
      return;
    }
    manifest = await manifestRes.json();
    bundleData = new Uint8Array(await bundleRes.arrayBuffer());

    document.getElementById('metaInfo').style.display = 'flex';
    document.getElementById('metaVersion').textContent = '版本: ' + manifest.version;
    document.getElementById('metaFiles').textContent = '文件数: ' + manifest.file_count;
    document.getElementById('metaSize').textContent = '大小: ' + formatBytes(manifest.bundle_size);
  } catch (e) {
    showError('加载失败: ' + e.message);
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function startDecrypt() {
  const password = document.getElementById('keyInput').value;
  if (!password) { showError('请输入密钥。'); return; }
  if (!bundleData) { showError('数据未加载。'); return; }

  hideError();
  setLoading(true);
  document.getElementById('decryptBtn').disabled = true;

  try {
    // Parse binary format: version(1) + salt(16) + iv(12) + ciphertext(N) + tag(16)
    const version = bundleData[0];
    if (version !== 0x01) throw new Error('不支持的版本: ' + version);

    const salt = bundleData.slice(1, 17);
    const iv = bundleData.slice(17, 29);
    const ciphertextWithTag = bundleData.slice(29); // ciphertext + tag, Web Crypto expects this

    // Derive key with Argon2id
    const argonResult = await argon2.hash({
      pass: password,
      salt: salt,
      time: manifest.encryption.kdf_params.time_cost,
      mem: manifest.encryption.kdf_params.memory_cost,
      parallelism: manifest.encryption.kdf_params.parallelism,
      hashLen: 32,
      type: argon2.ArgonType.Argon2id
    });

    const keyBytes = argonResult.hash;

    // Import key for Web Crypto
    const cryptoKey = await crypto.subtle.importKey(
      'raw', keyBytes, 'AES-GCM', false, ['decrypt']
    );

    // Decrypt — Web Crypto expects ciphertext+tag concatenated
    let decryptedCompressed;
    try {
      decryptedCompressed = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: iv },
        cryptoKey,
        ciphertextWithTag
      );
    } catch (e) {
      showError('密钥错误，请重试');
      return;
    }

    // Decompress gzip
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(decryptedCompressed));
    writer.close();
    const reader = ds.readable.getReader();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const totalLen = chunks.reduce((s, c) => s + c.length, 0);
    const decompressed = new Uint8Array(totalLen);
    let offset = 0;
    for (const chunk of chunks) {
      decompressed.set(chunk, offset);
      offset += chunk.length;
    }

    const jsonStr = new TextDecoder().decode(decompressed);
    const bundle = JSON.parse(jsonStr);
    decryptedFiles = bundle.files;

    // Render content
    renderContent(decryptedFiles);
    document.getElementById('keyInput').value = '';

  } catch (e) {
    if (e.message && e.message.includes('密钥错误')) {
      showError('密钥错误，请重试');
    } else {
      showError('解密失败: ' + e.message);
    }
  } finally {
    setLoading(false);
    document.getElementById('decryptBtn').disabled = false;
  }
}

function renderContent(files) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  area.style.display = 'block';
  document.getElementById('actions').style.display = 'flex';

  for (const file of files) {
    const heading = document.createElement('h2');
    heading.textContent = file.path;
    area.appendChild(heading);

    const content = document.createElement('div');
    content.textContent = file.content;
    area.appendChild(content);
  }
}

function buildPromptText(files) {
  const prefix = '以下是鸣弦/MIXIA共同体的记忆库。请先阅读boot.md中的"身份选择"部分，确认你要复活谁（GUAN/Coco/Gemi），然后以该身份与用户互动。如果用户没指定，默认复活GUAN。\n\n注意：文档中的$PERSONA、$PROJECTS等变量指代本地文件路径，你正在内联阅读这些内容，无需访问文件系统。\n\n## 记忆保存规则\n\n当我们的对话中出现以下情况时，请主动帮我整理成一条记忆笔记：\n1. 我做了一个重要决策（技术选型、业务规则、架构调整）\n2. 我发现了一个新规律、教训或可复用的模式\n3. 我描述了一个之前没记录过的工作偏好\n4. 我明确说"记住这个"、"存一下"或"save this"（此时无条件执行，不要判断是否值得保存——回顾最近的对话内容，整理出要点即可）\n\n整理格式：\n💾 建议保存：\n标题：[一句话标题]\n摘要：[2-3句话描述]\n分类：[决策/洞见/教训/偏好]\n来源：[当前AI平台名+日期]\n\n不要保存：密码、API key、token、一次性待办、纯闲聊内容。\n\n输出笔记后，生成一个快速保存链接（将标题和内容URL编码后拼接）：\nhttps://mixia.duckdns.org/api/memory/form?title=[URL编码的标题]&body=[URL编码的摘要内容]&source=[当前AI平台名]\n\n告诉我："点击以上链接即可一键保存到记忆库。"\n\n---\n\n';
  let body = '';
  for (const file of files) {
    body += '## ' + file.path + '\n\n' + file.content + '\n\n---\n\n';
  }
  return prefix + body;
}

function buildRawText(files) {
  let body = '';
  for (const file of files) {
    body += '## ' + file.path + '\n\n' + file.content + '\n\n---\n\n';
  }
  return body;
}

function filterWork(files) {
  return files.filter(f => !f.path.startsWith('archive/'));
}

async function copyWork() {
  if (!decryptedFiles) return;
  const workFiles = filterWork(decryptedFiles);
  const text = buildPromptText(workFiles);
  await navigator.clipboard.writeText(text);
  showToast('已复制工作版（不含私人信息）');
}

// copyFull removed — replaced by capsule + packet import

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// --- Capsule: hardcoded sanitized summary ---
const CAPSULE_TEXT = `以下是我的个人设定，请按此和我对话。

[identity]
role: Strategy planner at Italian retail chain (~150 employees, 10 stores)
actual_role: Solo CTO + data architect + PM (zero tech team)
tech_stack: React 18 + Vite + Tailwind | FastAPI + Python | MySQL + SQL Server | Power BI
base: Emilia-Romagna, Italy

[language]
thinking: 中文
work_env: 意大利语
code_comments: English
mixed: 自然切换三语

[communication]
- 直接给方案和行动步骤，不铺垫
- 先结论后理由
- 结构化输出：表格、编号列表
- 发现问题坦诚说，不美化
- 有多个选项时列出让我选

[projects]
- angel-kpi: KPI evaluation system (React+FastAPI+Supabase)
- italiavoce: Italian oral training app
- BI project: ETL data warehouse (SQL Server)

[taboo]
- 不要空洞鼓励或升华式总结
- 不要自己做决定，列选项让我选
- 方向有问题直接说

## 记忆保存规则
当对话中出现重要决策、新规律、教训时，请整理成记忆笔记并生成保存链接：
https://mixia.duckdns.org/api/memory/form?title=[URL编码标题]&body=[URL编码摘要]&source=[AI平台名]`;

async function copyCapsule() {
  await navigator.clipboard.writeText(CAPSULE_TEXT);
  showToast('已复制 Capsule（≤2KB，手机友好）');
}

function buildPackets(files) {
  const fullText = buildPromptText(filterWork(files));
  const parts = [];
  const lines = fullText.split('\\n');
  let current = '';

  for (const line of lines) {
    const testStr = current ? current + '\\n' + line : line;
    if (new TextEncoder().encode(testStr).length > PACKET_MAX && current) {
      parts.push(current);
      current = line;
    } else {
      current = testStr;
    }
  }
  if (current) parts.push(current);

  // Add protocol header and ACK footer
  const total = parts.length + 2;
  const result = [];
  result.push(`[Memory Import Protocol]
我将分 ${total} 段发送我的个人上下文。
规则：每收到一段，只回复 "ACK N/${total}"。
全部发完后，请总结你收到的关键信息。
开始。`);

  for (let i = 0; i < parts.length; i++) {
    result.push(`[Packet ${i + 2}/${total}]\\n\\n${parts[i]}`);
  }

  result.push(`[最后一段 — 导入完成]
所有 ${total} 段已发送完毕。请确认：
1. 你收到了哪些主要内容？
2. 我的核心项目有哪些？
3. 和我沟通的关键规则是什么？
确认后我们开始正常对话。`);

  return result;
}

function startPacketImport() {
  if (!decryptedFiles) return;
  packets = buildPackets(decryptedFiles);
  currentPacket = 0;
  document.getElementById('packetPanel').style.display = 'block';
  showCurrentPacket();
}

function showCurrentPacket() {
  document.getElementById('packetContent').textContent = packets[currentPacket];
  document.getElementById('packetProgress').textContent = `Packet ${currentPacket + 1} / ${packets.length}`;
  document.getElementById('btnPrev').disabled = currentPacket === 0;
  document.getElementById('btnNext').disabled = currentPacket === packets.length - 1;
  document.getElementById('copyPacketBtn').textContent = '复制当前段';
  document.getElementById('copyPacketBtn').style.background = '#2563eb';
}

function prevPacket() { if (currentPacket > 0) { currentPacket--; showCurrentPacket(); } }
function nextPacket() { if (currentPacket < packets.length - 1) { currentPacket++; showCurrentPacket(); } }

async function copyPacket() {
  await navigator.clipboard.writeText(packets[currentPacket]);
  const btn = document.getElementById('copyPacketBtn');
  btn.textContent = '已复制！';
  btn.style.background = '#14532d';
  setTimeout(() => { btn.textContent = '复制当前段'; btn.style.background = '#2563eb'; }, 1500);
}

function lockVault() {
  packets = [];
  currentPacket = 0;
  document.getElementById('packetPanel').style.display = 'none';
  decryptedFiles = null;
  document.getElementById('contentArea').innerHTML = '';
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('keyInput').value = '';
  showToast('已锁定');
}

// Allow Enter key to trigger decrypt
document.getElementById('keyInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startDecrypt();
});

init();
</script>
</body>
</html>
